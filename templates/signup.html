<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="navbar">
    <div class="menu">☰</div>
    <div class="logo">BloodConnect</div>
    <div class="nav-links">
        {% if user %}
            <a href="/">Home</a>
            <a href="/profile">Profile</a>
            <a href="/logout">Logout</a>
        {% else %}
            <a href="/">Home</a>
            <a href="/login">Sign In</a>
            <a href="/signup">Sign Up</a>
        {% endif %}
    </div>
</div>

<div class="card">
    <h2>Create Your BloodConnect Account</h2>
    <p class="card-subtitle">Register as a donor or requester and get matched with blood donors nearby.</p>

    <form id="signupForm" method="POST" action="/signup" onsubmit="return showSignupStatus()">

        <label>Name</label>
        <input type="text" name="name" placeholder="Enter your full name" required>

        <label>Email</label>
        <input type="email" name="email" placeholder="Enter your email address" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="Create a strong password" required>

        <label>Phone</label>
        <input type="tel" name="phone" placeholder="Enter your phone number" required>

        <label>Age</label>
        <input type="number" name="age" placeholder="Enter your age" min="18" max="65" required>

        <label>Weight</label>
        <input type="number" name="weight" placeholder="Enter your weight in kg" min="45" max="150" required>

        <label>Blood Group</label>
        <select name="blood" required>
            <option value="">Select blood group</option>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>B-</option>
            <option>O+</option>
            <option>O-</option>
            <option>AB+</option>
            <option>AB-</option>
        </select>

        <label>Location</label>
        <input type="text" name="location" placeholder="Type your area / city" autocomplete="off" id="location" required>
        <div id="suggestions" class="suggestions-box"></div>

        <input type="hidden" name="latitude" id="latitude">
        <input type="hidden" name="longitude" id="longitude">

        <button type="button" class="secondary-btn" onclick="useMyLocation()">Use My Current Location</button>

        <label>Are you willing to donate?</label>
        <select name="is_donor" id="is_donor">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select>

        <div id="donationSection" style="display:none;">
            <label>Have you donated before?</label>
            <select id="donated_before">
                <option value="no">No</option>
                <option value="yes">Yes</option>
            </select>

            <div id="lastDonatedField" style="display:none;">
                <label>Last Donated Date</label>
                <input type="date" name="last_donated">
            </div>
        </div>

        <div style="margin-top: 20px; text-align: center;">
            <button type="submit" class="primary-btn submit-btn">🚀 Create Account</button>
        </div>
    </form>

    <p id="msg" class="error-msg">{% if error %}{{ error }}{% endif %}</p>
</div>

<script>
function showSignupStatus() {
    const msg = document.getElementById('msg');
    if (validateForm()) {
        msg.innerHTML = '<span class="loading"></span>Creating your account...';
        msg.style.color = '#1f7a3d';
        return true;
    }
    return false;
}

function validateForm() {
    const name = document.querySelector('input[name="name"]').value.trim();
    const email = document.querySelector('input[name="email"]').value.trim();
    const password = document.querySelector('input[name="password"]').value;
    const phone = document.querySelector('input[name="phone"]').value.trim();
    const age = document.querySelector('input[name="age"]').value;
    const weight = document.querySelector('input[name="weight"]').value;
    const blood = document.querySelector('select[name="blood"]').value;
    const location = document.querySelector('input[name="location"]').value.trim();
    const msg = document.getElementById("msg");

    // Clear previous messages
    msg.innerHTML = "";
    msg.style.color = "red";

    // Name validation
    if (name.length < 2) {
        msg.innerHTML = "Name must be at least 2 characters long.";
        return false;
    }

    // Email validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        msg.innerHTML = "Please enter a valid email address.";
        return false;
    }

    // Password validation
    if (password.length < 6) {
        msg.innerHTML = "Password must be at least 6 characters long.";
        return false;
    }

    // Phone validation (basic)
    const phoneRegex = /^\+?[\d\s\-\(\)]{10,}$/;
    if (!phoneRegex.test(phone)) {
        msg.innerHTML = "Please enter a valid phone number.";
        return false;
    }

    // Age validation
    const ageNum = parseInt(age);
    if (isNaN(ageNum) || ageNum < 18 || ageNum > 65) {
        msg.innerHTML = "Age must be between 18 and 65.";
        return false;
    }

    // Weight validation
    const weightNum = parseFloat(weight);
    if (isNaN(weightNum) || weightNum < 45 || weightNum > 150) {
        msg.innerHTML = "Weight must be between 45kg and 150kg.";
        return false;
    }

    // Blood group validation
    if (!blood) {
        msg.innerHTML = "Please select your blood group.";
        return false;
    }

    // Location validation
    if (!location) {
        msg.innerHTML = "Please select or enter your location.";
        return false;
    }

    // Check if latitude/longitude are set
    const lat = document.getElementById("latitude").value;
    const lon = document.getElementById("longitude").value;
    if (!lat || !lon) {
        msg.innerHTML = "Please select a location from suggestions or use current location.";
        return false;
    }

    return true;
}

let debounceTimer;

document.getElementById("location").addEventListener("input", function () {
    const query = this.value.trim();
    clearTimeout(debounceTimer);

    if (query.length < 3) {
        document.getElementById("suggestions").innerHTML = "";
        return;
    }

    debounceTimer = setTimeout(() => {
        fetchLocationSuggestions(query);
    }, 400);
});

async function fetchLocationSuggestions(query) {
    const suggestionsBox = document.getElementById("suggestions");

    try {
        const response = await fetch(
            `https://nominatim.openstreetmap.org/search?format=jsonv2&q=${encodeURIComponent(query)}&limit=5`
        );
        const data = await response.json();

        suggestionsBox.innerHTML = "";

        if (!data.length) {
            suggestionsBox.innerHTML = `<div class="suggestion-item">No matching locations found</div>`;
            return;
        }

        data.forEach(place => {
            const item = document.createElement("div");
            item.className = "suggestion-item";
            item.textContent = place.display_name;

            item.onclick = function () {
                document.getElementById("location").value = place.display_name;
                document.getElementById("latitude").value = place.lat;
                document.getElementById("longitude").value = place.lon;
                suggestionsBox.innerHTML = "";
                document.getElementById("msg").innerHTML = "Location selected.";
                document.getElementById("msg").style.color = "green";
            };

            suggestionsBox.appendChild(item);
        });

    } catch (error) {
        suggestionsBox.innerHTML = "";
        console.log(error);
    }
}

function useMyLocation() {
    const msg = document.getElementById("msg");

    if (!navigator.geolocation) {
        msg.style.color = "red";
        msg.innerHTML = "Geolocation is not supported by your browser.";
        return;
    }

    msg.style.color = "#222";
    msg.innerHTML = "Fetching your current location...";

    navigator.geolocation.getCurrentPosition(
        async function(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;

            document.getElementById("latitude").value = lat;
            document.getElementById("longitude").value = lon;

            try {
                const response = await fetch(
                    `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`
                );
                const data = await response.json();

                let place =
                    data.address?.city ||
                    data.address?.town ||
                    data.address?.village ||
                    data.address?.suburb ||
                    data.display_name ||
                    "Current Location";

                document.getElementById("location").value = place;
                document.getElementById("suggestions").innerHTML = "";
                msg.style.color = "green";
                msg.innerHTML = "Current location detected successfully.";
            } catch (error) {
                document.getElementById("location").value = `${lat}, ${lon}`;
                msg.style.color = "green";
                msg.innerHTML = "Coordinates captured, but place name not found.";
            }
        },
        function() {
            msg.style.color = "red";
            msg.innerHTML = "Unable to retrieve your location.";
        }
    );
}

document.getElementById("is_donor").addEventListener("change", function() {
    document.getElementById("donationSection").style.display =
        this.value == "1" ? "block" : "none";
});

document.getElementById("donated_before").addEventListener("change", function() {
    document.getElementById("lastDonatedField").style.display =
        this.value === "yes" ? "block" : "none";
});

document.addEventListener("click", function(e) {
    if (e.target.id !== "location") {
        document.getElementById("suggestions").innerHTML = "";
    }
});
</script>

</body>
</html>
